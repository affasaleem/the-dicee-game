<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 Roll Royale</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="bg-circle circle1"></div>
    <div class="bg-circle circle2"></div>

    <div class="container">

        <h1>🎲 Roll Royale</h1>
        <p class="subtitle">Roll the dice and crown the champion!</p>

        <div class="dice-wrapper">

            <div class="dice-card">
                <p>Player 1</p>
                <img class="img1" src="./images/dice6.png" alt="Player 1 Dice">
            </div>

            <div class="dice-card">
                <p>Player 2</p>
                <img class="img2" src="./images/dice6.png" alt="Player 2 Dice">
            </div>

        </div>

        <button class="roll-btn" onclick="window.location.reload()">
            🎲 Roll Again
        </button>

    </div>

    <footer>
        Made with ❤️ | Roll Royale
    </footer>

    <script src="script.js"></script>

</body>

</html>
